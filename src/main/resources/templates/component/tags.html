<div class="tags" th:fragment="tags">
    <div class="tags-main mb-1" th:if="${postList.tag != null}" th:text="${ '#' + postList.tag }"></div>
    <div class="flex flex-row">
        <div class="tags-item mr-1" th:each="tag : ${tagList}">
            <a th:href="${ postList.year == null ? '?tag=' + tag.slug : '?tag=' + tag.slug + '&year=' + postList.year}" th:text="'#' + ${tag.name}"></a>
        </div>
    </div>
</div>
